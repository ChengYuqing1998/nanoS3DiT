[paths]
manifest = "cache/overfit-emnist-vae-latents/z-image-vae-128-bf16/manifest.jsonl"
output_dir = "checkpoints/nano-s3dit-overfit-176m"

[model]
dim = 736
n_layers = 18
n_refiner_layers = 2
n_heads = 16
n_kv_heads = 16
cap_feat_dim = 1024
in_channels = 16
patch_size = 2
f_patch_size = 1
axes_dims = [16, 24, 24]
axes_lens = [1024, 256, 256]
rope_theta = 256.0
qk_norm = true

[train]
seed = 42
max_steps = 2000
batch_size = 52
grad_accum_steps = 1
learning_rate = 2.0e-4
min_learning_rate = 2.0e-5
warmup_steps = 100
lr_scheduler = "cosine"
weight_decay = 0.0
max_grad_norm = 1.0
log_every = 10
save_every = 500
keep_last_checkpoints = 3
keep_best_checkpoint = true
num_workers = 4
dtype = "bf16"
sigma_min = 0.0
sigma_max = 1.0
time_sampling = "uniform"
model_time = "one_minus_sigma"
gradient_checkpointing = true
